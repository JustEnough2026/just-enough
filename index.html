<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#315746">
  <meta name="description" content="食材有限 Just Enough 線上點餐">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="stylesheet" href="styles.css">
  <title>食材有限｜線上點餐</title>
</head>
<body>
<header class="hero">
  <div class="hero-inner">
    <p class="eyebrow">TAINAN · YONGKANG</p>
    <h1>食材有限</h1>
    <p class="brand-en">Just Enough</p>
    <p class="tagline">食材剛剛好，味道剛剛好。</p>
    <div class="status"><span></span> 今日營業 11:00–20:00（售完為止）</div>
    <a class="primary" href="#menu">立即點餐</a>
  </div>
</header>

<main>
  <section class="notice card">
    <strong>今日公告</strong>
    <p id="announcement">餐點皆為每日限量，建議先完成預訂。</p>
  </section>

  <section id="menu">
    <div class="section-title">
      <p>MENU</p><h2>今日菜單</h2>
    </div>
    <div id="product-list" class="products"></div>
  </section>

  

  <section class="order-form card">
    <div class="section-title compact"><p>CHECKOUT</p><h2>取餐資料</h2></div>
    <label>暱稱<input id="customer-name" autocomplete="name" placeholder="請輸入暱稱"></label>
    <label>取餐時間<input id="pickup-time" type="time"></label>
    <label>備註<textarea id="note" rows="3" placeholder="例如：不要花生、晚一點取餐"></textarea></label>
  </section>

  <section class="info card">
    <p><strong>訂購電話</strong><a href="tel:0903387164">0903-387-164</a></p>
    <p><strong>地址</strong>永康區正強街200號（米里旁）</p>
    <p class="allergy">餐點內含花生或芝麻，過敏者請先告知。</p>
  </section>
</main>

<div class="cart-bar">
  <div><span id="cart-count">0 份</span><strong id="cart-total">$0</strong></div>
  <button id="open-cart">查看訂單</button>
</div>

<div id="cart-sheet" class="sheet" aria-hidden="true">
  <div class="sheet-panel">
    <button class="close" id="close-cart" aria-label="關閉">×</button>
    <h2>您的訂單</h2>
    <div id="cart-items"></div>
    <div class="total-row"><span>總金額</span><strong id="sheet-total">$0</strong></div>
    <button id="send-line" class="primary full">複製訂單並開啟 LINE</button>
    <button id="copy-order" class="secondary full">只複製訂單文字</button>
    <p class="hint">送出前請確認品項、數量與取餐時間。</p>
  </div>
</div>

<template id="product-template">
  <article class="product card">
    <img class="product-img" alt="">
    <div class="product-body">
      <div class="product-top"><div><h3></h3><p class="desc"></p></div><strong class="price"></strong></div>
      <div class="options"></div>
      <div class="quantity">
        <button class="minus" aria-label="減少">−</button>
        <span class="qty">0</span>
        <button class="plus" aria-label="增加">＋</button>
      </div>
    </div>
  </article>
</template>

<script src="app.js"></script>
</body>
</html>
