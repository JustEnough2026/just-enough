<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#315746">
  <meta name="description" content="食材有限 Just Enough 線上點餐">
  <title>食材有限 Just Enough｜線上點餐</title>
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="styles.css?v=3.0.0">
  <script defer src="config.js?v=3.0.0"></script>
  <script defer src="app.js?v=3.0.0"></script>
</head>
<body>
<header class="hero">
  <img class="hero-photo" src="spicy_chicken.jpg" alt="口水雞">
  <div class="hero-shade"></div>
  <div class="hero-content">
    <p class="eyebrow">TAINAN · YONGKANG</p>
    <h1>食材有限</h1>
    <p class="brand-en">Just Enough</p>
    <p class="tagline">食材剛剛好，味道剛剛好。</p>
    <div id="open-status" class="status"></div>
    <a class="primary" href="#menu">立即點餐</a>
  </div>
</header>

<main>
  <section class="notice card">
    <div><span class="label">今日公告</span><p id="announcement"></p></div>
  </section>

  <section class="quick-links" aria-label="店家連結">
    <a id="line-link" class="quick-link" target="_blank" rel="noopener">LINE 社群</a>
    <a id="phone-link" class="quick-link">電話預訂</a>
    <a id="map-link" class="quick-link" target="_blank" rel="noopener">導航取餐</a>
    <a id="foodpanda-link" class="quick-link optional" target="_blank" rel="noopener">Foodpanda</a>
    <a id="uber-link" class="quick-link optional" target="_blank" rel="noopener">Uber Eats</a>
  </section>

  <section id="menu">
    <div class="section-title"><p>MENU</p><h2>今日菜單</h2><span>每項餐點可獨立選擇數量</span></div>
    <div id="product-list" class="products"></div>
  </section>

  <section class="order-form card">
    <div class="section-title compact"><p>CHECKOUT</p><h2>取餐資料</h2></div>
    <div class="form-grid">
      <label>暱稱／姓名<input id="customer-name" autocomplete="name" placeholder="請輸入取餐人姓名"></label>
      <label>聯絡電話<input id="customer-phone" inputmode="tel" autocomplete="tel" placeholder="例如：0912-345-678"></label>
      <label>取餐日期<input id="pickup-date" type="date"></label>
      <label>取餐時間<input id="pickup-time" type="time"></label>
    </div>
    <label>備註<textarea id="note" rows="3" placeholder="例如：不要花生、餐具數量"></textarea></label>
  </section>

  <section class="info card">
    <p><strong>訂購電話</strong><a id="info-phone"></a></p>
    <p><strong>取餐地址</strong><span id="info-address"></span></p>
    <p class="allergy">餐點可能含花生、芝麻或其他過敏原，過敏者請先告知。</p>
  </section>
</main>

<div class="cart-bar" id="cart-bar">
  <div><span id="cart-count">0 份</span><strong id="cart-total">$0</strong></div>
  <button id="open-cart">查看訂單</button>
</div>

<div id="cart-sheet" class="sheet" aria-hidden="true">
  <div class="sheet-panel">
    <button class="close" id="close-cart" aria-label="關閉">×</button>
    <h2>您的訂單</h2>
    <div id="cart-items"></div>
    <div class="total-row"><span>總金額</span><strong id="sheet-total">$0</strong></div>
    <button id="send-line" class="primary full">複製訂單並開啟 LINE</button>
    
  </div>
</div>

<template id="product-template">
  <article class="product card">
    <div class="image-wrap"><img class="product-img" alt=""><span class="badge"></span><span class="sold-label">已售完</span></div>
    <div class="product-body">
      <div class="product-top"><div><h3></h3><p class="desc"></p><p class="stock"></p></div><strong class="price"></strong></div>
      <div class="quantity"><button class="minus" aria-label="減少">−</button><span class="qty">0</span><button class="plus" aria-label="增加">＋</button></div>
    </div>
  </article>
</template>
</body>
</html>
